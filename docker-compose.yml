version: "3.8"

services: 
  web: 
    build: 
      context: . 
      dockerfile: Dockerfile
    container_name: myplayers-web
    ports: 
      - "8087:80"
    volumes: 
      - .:/var/www/html 
    depends_on: 
      - db 
    environment: 
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    restart: always
  
  db: 
    image: mysql:8.0
    environment: 
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myplayers
      MYSQL_USER: myplayers_user
      MYSQL_PASSWORD: myplayers_password
    ports: 
      - "3309:3306"
    volumes: 
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: myplayers-phpmyadmin
    restart: always
    ports: 
      - "8088:80"
    environment: 
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on: 
      - db
    
volumes:
  db_data: