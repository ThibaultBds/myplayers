version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myplayers-web
    ports:
      - "8087:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    restart: always
    networks:
      - myplayers-network

  db:
    image: mysql:8.0
    container_name: myplayers-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myplayers
      MYSQL_USER: myplayers_user
      MYSQL_PASSWORD: myplayers_password
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - myplayers-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: myplayers-phpmyadmin
    restart: always
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - myplayers-network

volumes:
  db_data:

networks:
  myplayers-network:
    driver: bridge